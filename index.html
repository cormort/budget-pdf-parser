<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>農業特別收入基金預算書pdf解析工具</title>
    <style>
        body { font-family: "Microsoft JhengHei", "微軟正黑體", Arial, sans-serif; margin: 20px; line-height: 1.6; background-color: #f8f9fa; color: #343a40; }
        .container { max-width: 98vw; margin: auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        p, .step-description { color: #6c757d; }
        .step { border: 1px solid #dee2e6; padding: 20px; border-radius: 5px; margin-top: 25px; }
        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        #fileInput { display: none; }
        .file-label { display: inline-block; padding: 10px 15px; background-color: #007bff; color: white; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; margin-right: 10px; }
        .file-label:hover { background-color: #0056b3; }
        #fileNameDisplay { display: inline-block; font-style: italic; color: #555; }
        button { padding: 10px 15px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background-color 0.3s; }
        .btn-main { background-color: #007bff; }
        .btn-main:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #output-area { width: 100%; box-sizing: border-box; height: 400px; margin-top: 10px; font-family: "Consolas", "Courier New", monospace; font-size: 14px; border: 1px solid #ced4da; border-radius: 5px; padding: 10px; resize: vertical; }
        #tableContainer { margin-top: 20px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
        th { background-color: #e9ecef; color: #495057; font-weight: bold; }
        .message { border-left: 4px solid; padding: 10px 15px; margin: 15px 0; border-radius: 4px; display: none; }
        .status-message { color: #004085; background-color: #cce5ff; border-color: #b8daff; }
        .error-message { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
        .replace-tool { display: flex; align-items: center; gap: 5px; }
        .replace-tool input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .replace-tool label { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .filter-container { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .filter-container input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; width: 300px; font-size: 14px; }
        .filter-container label { font-weight: bold; color: #495057; }
        .filter-container button { padding: 8px 15px; }
        #filterCount { color: #0056b3; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>農業特別收入基金預算書pdf解析工具</h1>
        
        <div class="step">
            <h2>步驟一：提取 PDF 文字</h2>
            <div class="controls">
                <label for="fileInput" class="file-label">選擇 PDF 檔案</label>
                <input type="file" id="fileInput" accept=".pdf">
                <span id="fileNameDisplay">尚未選擇檔案</span>
                <label>頁 <input type="number" id="pageFrom" min="1" style="width:70px; padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="起"> 到
                <input type="number" id="pageTo" min="1" style="width:70px; padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="迄"></label>
                <span style="color:#6c757d; font-size:13px;">（留空＝自動抓「基金用途明細表說明」章節）</span>
                <button id="extractBtn" class="btn-main" onclick="extractPdfText()">提取文字</button>
            </div>
        </div>
        
        <div id="statusMessage" class="message status-message"></div>
        <div id="errorOutput" class="message error-message"></div>

        <div class="step">
            <h2>步驟二：文字清理工具箱</h2>
            <p class="step-description">請依序使用以下工具清理文字，或手動編輯。您可以多次使用這些工具。</p>
            <div class="controls">
                <button class="btn-main" onclick="autoClean()" title="依序執行下列三個清理步驟">一鍵清理</button>
                <button class="btn-secondary" onclick="breakLinesByHeadings()">依標號重新斷行</button>
                <button class="btn-secondary" onclick="breaklineBeforeParenthesis()">在 (數字/中文數字) 前換行</button>
                <button class="btn-secondary" onclick="cleanInternalWhitespace()">清理行內空白 (保留縮排)</button>
                <button class="btn-secondary" onclick="stripPageNumbers()">去除頁碼</button>
            </div>
             <div class="controls">
                <div class="replace-tool">
                    <input type="text" id="findText" placeholder="尋找文字或 RegEx 模式">
                    <input type="text" id="replaceText" placeholder="取代為...">
                    <button class="btn-secondary" onclick="findAndReplace()">全局取代</button>
                    <label>
                        <input type="checkbox" id="useRegex"> 使用正規表示式 (RegEx)
                    </label>
                </div>
            </div>
            <textarea id="output-area" placeholder="提取的文字將顯示於此處，您可以在此進行編輯..."></textarea>
        </div>

        <div class="step">
            <h2>步驟三：轉換為表格</h2>
            <p class="step-description">清理完文字後，點擊此按鈕生成最終表格。</p>
            <button id="convertBtn" class="btn-success" onclick="convertToTable()" disabled>轉換為表格</button>
        </div>
        
        <div id="tableContainer">
            <p>最終表格將會顯示於此處。</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        // 基金分段標記行：提取時插在基金交界處，通過清理與斷行後仍保留，供轉表格時判定所屬基金
        const FUND_MARK = '⟦基金⟧';

        // ----- DOM cache -----
        const ui = {
            fileInput: document.getElementById('fileInput'),
            fileNameDisplay: document.getElementById('fileNameDisplay'),
            outputArea: document.getElementById('output-area'),
            errorOutput: document.getElementById('errorOutput'),
            statusMessage: document.getElementById('statusMessage'),
            extractBtn: document.getElementById('extractBtn'),
            convertBtn: document.getElementById('convertBtn'),
            tableContainer: document.getElementById('tableContainer'),
            findTextInput: document.getElementById('findText'),
            replaceTextInput: document.getElementById('replaceText'),
            useRegexCheckbox: document.getElementById('useRegex'),
            filterInput: null,
            filterBtn: null,
            filterCount: null,
            resultTable: null,
        };
        ui.fileInput.addEventListener('change', () => { ui.fileNameDisplay.textContent = (ui.fileInput.files && ui.fileInput.files.length > 0) ? `已選擇：${ui.fileInput.files[0].name}` : '尚未選擇檔案'; });
        function showMessage(element, text) { hideMessages(); element.textContent = text; element.style.display = 'block'; }
        function hideMessages() { ui.statusMessage.style.display = 'none'; ui.errorOutput.style.display = 'none'; }

        async function extractPdfText() {
            hideMessages();
            ui.outputArea.value = ''; ui.tableContainer.innerHTML = '<p>最終表格將會顯示於此處。</p>';
            ui.extractBtn.disabled = true; ui.convertBtn.disabled = true;
            if (!ui.fileInput.files || ui.fileInput.files.length === 0) { showMessage(ui.errorOutput, '請先選擇一個 PDF 文件！'); ui.extractBtn.disabled = false; return; }
            showMessage(ui.statusMessage, '正在讀取檔案...');
            const file = ui.fileInput.files[0]; const typedarray = new Uint8Array(await file.arrayBuffer());
            try {
                const pdfDoc = await pdfjsLib.getDocument({ data: typedarray }).promise;
                const SECTION_MARKER = '基金用途明細表說明';
                const Y_TOLERANCE = 3;
                const pageFrom = parseInt(document.getElementById('pageFrom').value, 10) || 0;
                const pageTo = parseInt(document.getElementById('pageTo').value, 10) || 0;
                const useRange = pageFrom >= 1 && pageTo >= pageFrom;
                const firstPage = useRange ? Math.min(pageFrom, pdfDoc.numPages) : 1;
                const lastPage = useRange ? Math.min(pageTo, pdfDoc.numPages) : pdfDoc.numPages;
                const pageLinesList = [];
                for (let i = firstPage; i <= lastPage; i++) {
                    showMessage(ui.statusMessage, `正在處理第 ${i} / ${pdfDoc.numPages} 頁...`);
                    const page = await pdfDoc.getPage(i); const textContent = await page.getTextContent();
                    const items = textContent.items;
                    // O(n) single-pass clustering using sorted-by-y approach
                    const sorted = items.map(it => ({ y: it.transform[5], x: it.transform[4], str: it.str }))
                        .sort((a, b) => b.y - a.y);
                    const groups = [];
                    for (const s of sorted) {
                        if (groups.length > 0 && Math.abs(groups[groups.length - 1].yRef - s.y) <= Y_TOLERANCE) {
                            groups[groups.length - 1].items.push(s);
                        } else {
                            groups.push({ yRef: s.y, items: [s] });
                        }
                    }
                    const lines = groups.map(g => {
                        g.items.sort((a, b) => a.x - b.x);
                        return g.items.map(it => it.str).join('');
                    });
                    pageLinesList.push(lines);
                }
                // 使用者指定頁碼範圍時直接採用；否則只保留頁首含「基金用途明細表說明」的頁
                // （頁首需整行等於標記（去空白），避免誤抓目次頁；無任何頁符合時退回全部頁面）。
                const inSection = lines => lines.slice(0, 6).some(ln => ln.replace(/[\s　]/g, '') === SECTION_MARKER);
                let usedPages, sectionNote;
                if (useRange) {
                    usedPages = pageLinesList;
                    sectionNote = `（第 ${firstPage} 到 ${lastPage} 頁，共 ${usedPages.length} 頁）`;
                } else {
                    const selected = pageLinesList.filter(inSection);
                    usedPages = selected.length ? selected : pageLinesList;
                    sectionNote = selected.length ? `（自動篩選出「${SECTION_MARKER}」章節 ${selected.length} / ${pdfDoc.numPages} 頁）` : '';
                }
                // 每頁頁首「基金用途明細表說明」上一行即基金名稱；基金交界處插入標記行
                const fundOfPage = lines => {
                    const head = lines.slice(0, 6).map(l => l.replace(/[\s　]/g, ''));
                    const i = head.indexOf(SECTION_MARKER);
                    return (i >= 1 && head[i - 1]) ? head[i - 1] : '';
                };
                let prevFund = '';
                const outParts = [];
                for (const lines of usedPages) {
                    const f = fundOfPage(lines) || prevFund;
                    if (f && f !== prevFund) outParts.push(FUND_MARK + f);
                    prevFund = f;
                    outParts.push(lines.join('\n'));
                }
                ui.outputArea.value = outParts.join('\n').trim();
                const funds = [...new Set([...ui.outputArea.value.matchAll(new RegExp('^' + FUND_MARK + '(.+)$', 'gm'))].map(m => m[1]))];
                const fundNote = funds.length > 1 ? `（辨識出 ${funds.length} 個基金：${funds.join('、')}）` : (funds.length === 1 ? `（基金：${funds[0]}）` : '');
                showMessage(ui.statusMessage, `提取完成！${sectionNote}${fundNote}您現在可以在下方的文字區進行編輯與清理。`);
                ui.convertBtn.disabled = false;
            } catch (err) {
                console.error("提取 PDF 時發生錯誤:", err);
                showMessage(ui.errorOutput, `提取 PDF 時發生錯誤：${err.message}${err.name === 'PasswordException' ? ' (文件可能已加密)' : ''}`);
            } finally { ui.extractBtn.disabled = false; }
        }

        function findAndReplace() {
            const findText = ui.findTextInput.value; const replaceText = ui.replaceTextInput.value; const useRegex = ui.useRegexCheckbox.checked;
            if (!findText) { showMessage(ui.errorOutput, "「尋找文字」欄位不能為空。"); return; }
            const originalText = ui.outputArea.value; let regex;
            try {
                if (useRegex) { regex = new RegExp(findText, 'g'); } else { regex = new RegExp(findText.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g'); }
                const newText = originalText.replace(regex, replaceText);
                const replacementsCount = (originalText.match(regex) || []).length;
                ui.outputArea.value = newText;
                showMessage(ui.statusMessage, `完成！共取代了 ${replacementsCount} 處。`);
            } catch (e) { showMessage(ui.errorOutput, "正規表示式錯誤：" + e.message); }
        }

        function splitAtPeriodOutsideParens(text) {
            let depth = 0;
            const out = [];
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (c === '（' || c === '(') depth++;
                else if ((c === '）' || c === ')') && depth > 0) depth--;
                out.push(c);
                if (c === '。' && depth === 0) out.push('\n');
            }
            return out.join('');
        }

        function reflowBlock(block) {
            let singleLine = block.replace(/\n/g, ' ').replace(/\s+/g, ' ');
            const headingRegex = new RegExp(
                '(?<=^|\\s)(' +
                    '[壹貳參肆伍陸柒捌玖拾]、|' +
                    '[一二三四五六七八九十]、|' +
                    '[^\\s－，。：、]+(?:、[^\\s－，。：、]+)*－|' +
                    '\\d+\\.(?!\\d)' +
                ')',
                'g'
            );
            singleLine = singleLine.replace(headingRegex, '\n$1');
            singleLine = singleLine.replace(/\n([壹貳參肆伍陸柒捌玖拾]、)/g, '\n\n$1');
            singleLine = splitAtPeriodOutsideParens(singleLine);
            return singleLine.trim();
        }

        function breakLinesByHeadings() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            // 基金標記行不參與 reflow：以它為界分段各自重新斷行，標記行原樣保留
            const out = [];
            let buf = [];
            for (const line of text.split('\n')) {
                if (line.startsWith(FUND_MARK)) {
                    if (buf.length) { out.push(reflowBlock(buf.join('\n'))); buf = []; }
                    out.push(line);
                } else {
                    buf.push(line);
                }
            }
            if (buf.length) out.push(reflowBlock(buf.join('\n')));
            ui.outputArea.value = out.filter(s => s !== '').join('\n');
            showMessage(ui.statusMessage, "已根據標號與句末「。」重新斷行 (v36)。");
        }

        function breaklineBeforeParenthesis() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            const regex = /(\(\d{1,2}\)|\([一二三四五六七八九十]+\))/g;
            ui.outputArea.value = text.replace(regex, '\n  $1');
            showMessage(ui.statusMessage, "已在所有 (1-99的數字/中文數字) 前插入換行與縮排。");
        }

        function cleanInternalWhitespace() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            const lines = text.split('\n');
            const cleanedLines = lines.map(line => {
                const match = line.match(/^(\s*)/); const leadingWhitespace = match ? match[1] : '';
                const content = line.substring(leadingWhitespace.length); const cleanedContent = content.replace(/\s+/g, ' ').trim();
                return leadingWhitespace + cleanedContent;
            });
            ui.outputArea.value = cleanedLines.join('\n');
            showMessage(ui.statusMessage, "已清理行內多餘空白，並保留行首縮排。");
        }

        function stripPageNumbers() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            const lines = text.split('\n');
            const pageRegex = /^[\s　]*[0-9０-９]+(?:[-－‐–—][0-9０-９]+)?[\s　]*$/;
            const dateHeaderRegex = /^中華民國[\s　]*[0-9０-９]+[\s　]*年度$/;
            const pureCjkRegex = /^[一-鿿]{2,10}$/;
            // 機關名/基金名等頁首行 = 短純中文行且整份重複出現 >= 3 次，動態偵測不寫死
            const counts = {};
            for (const line of lines) {
                const c = line.trim().replace(/[\s　]/g, '');
                if (pureCjkRegex.test(c)) counts[c] = (counts[c] || 0) + 1;
            }
            let count = 0;
            const filteredLines = lines.filter(line => {
                const t = line.trim();
                const c = t.replace(/[\s　]/g, '');
                if (pageRegex.test(t) || c === '基金用途明細表說明' || dateHeaderRegex.test(c)
                    || (pureCjkRegex.test(c) && counts[c] >= 3)) { count++; return false; }
                return true;
            });
            ui.outputArea.value = filteredLines.join('\n');
            showMessage(ui.statusMessage, `已去除 ${count} 行頁碼與頁首標題。`);
        }

        function autoClean() {
            if (!ui.outputArea.value) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            stripPageNumbers();
            breakLinesByHeadings();
            breaklineBeforeParenthesis();
            cleanInternalWhitespace();
            showMessage(ui.statusMessage, "已完成一鍵清理 (去除頁碼 → 依標號斷行 → 在括號前換行 → 清理行內空白)。");
        }

        // ----- Account chart (built once at module level) -----
        const _DROPS_RE = /[\s、及－\-]/;
        const _normalize = (str) => str
            .replace(/（[^）]*）/g, '')
            .replace(/\([^)]*\)/g, '')
            .replace(/[\s、及－\-]/g, '');

        const _walkMatch = (line, normName) => {
            let pos = 0, consumed = 0, depth = 0;
            while (pos < line.length && consumed < normName.length) {
                const c = line[pos];
                if (c === '（' || c === '(') { depth++; pos++; continue; }
                if (c === '）' || c === ')') { if (depth > 0) depth--; pos++; continue; }
                if (depth > 0) { pos++; continue; }
                if (_DROPS_RE.test(c)) { pos++; continue; }
                consumed++; pos++;
            }
            return consumed === normName.length ? line.substring(pos) : null;
        };

        const _codeToName = new Map();
        const _chart = [];
        const _chartByLen = { 1: [], 2: [], 3: [] };
        accountChartText.trim().split('\n').forEach(line => {
            const parts = line.trim().split(/\s+/);
            if (parts.length >= 2) {
                const code = parts[0];
                const name = parts.slice(1).join(' ');
                _codeToName.set(code, name);
                const norm = _normalize(name);
                if (norm) {
                    const item = { code, name, norm };
                    _chart.push(item);
                    const clen = code.length;
                    if (_chartByLen[clen]) _chartByLen[clen].push(item);
                }
            }
        });
        _chart.sort((a, b) => b.norm.length - a.norm.length);

        const _matchAccount = (line, predicate) => {
            const normLine = _normalize(line);
            for (const item of _chart) {
                if (predicate && !predicate(item)) continue;
                if (!item.norm) continue;
                if (!normLine.startsWith(item.norm)) continue;
                const rest = _walkMatch(line, item.norm);
                if (rest !== null) return { code: item.code, name: item.name, rest };
            }
            return null;
        };

        const _amountPatterns = [
            /合共\s*([\d,]+)\s*千元/,
            /編列\s*([\d,]+)\s*千元/,
            /([\d,]+)\s*千元/,
        ];
        const _extractAmount = (line) => {
            if (!line) return '';
            for (const p of _amountPatterns) {
                const m = line.match(p);
                if (m && m[1]) {
                    const n = parseInt(m[1].replace(/,/g, ''), 10);
                    if (!isNaN(n)) return n * 1000;
                }
            }
            return '';
        };

        const _planL1Regex = /^[壹貳參肆伍陸柒捌玖拾]、/;
        const _planL2Regex = /^[一二三四五六七八九十]、/;
        // 中文數字括號且整行不含金額 → 子計畫標題（第三層計畫）
        const _planL3Regex = /^[（(][一二三四五六七八九十]+[）)]/;
        const _numberPrefixRegex = /^\s*(\d+)\.\s*/;
        const _parenPrefixRegex = /^\s*\((\d+|[一二三四五六七八九十]+)\)\s*/;

        // 預算別：同一計畫下的預算來源區分（原年度預算 vs 災後復原特別預算），非子計畫也非科目
        const _budgetType = (s) => {
            const t = s.trim();
            if (t === '原年度預算') return '原年度預算';
            if (t.includes('特別預算') || t.includes('災後復原重建')) return '特別預算';
            return '';
        };

        function convertToTable() {
            hideMessages();
            const text = ui.outputArea.value;
            if (!text) {
                showMessage(ui.errorOutput, '文字區沒有內容，無法轉換。');
                return;
            }

            let currentFund = '';
            let currentPlanL1 = '', currentPlanL2 = '', currentPlanL3 = '', currentBudget = '';
            let currentL1 = '', currentL2 = '', currentL3 = '';
            const rows = [];
            const unmatchedLines = [];

            const lines = text.split('\n').filter(l => l.trim() !== '');

            for (const raw of lines) {
                const line = raw.trim();

                if (line.startsWith(FUND_MARK)) {
                    currentFund = line.substring(FUND_MARK.length).trim();
                    currentPlanL1 = currentPlanL2 = currentPlanL3 = currentBudget = '';
                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }

                if (_planL1Regex.test(line)) {
                    currentPlanL1 = line.replace(_planL1Regex, '').trim();
                    currentPlanL2 = currentPlanL3 = currentBudget = '';
                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }
                if (_planL2Regex.test(line)) {
                    currentPlanL2 = line.replace(_planL2Regex, '').trim();
                    currentPlanL3 = currentBudget = '';
                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }

                // 預算別標題（(一)原年度預算 / (二)因應…災後復原重建，或 1./2. 形式）
                if (!line.includes('千元')) {
                    const mcn = line.match(_planL3Regex);
                    const mnum = line.match(_numberPrefixRegex);
                    let htext = null;
                    if (mcn) htext = line.substring(mcn[0].length).trim();
                    else if (mnum) htext = line.substring(mnum[0].length).trim();
                    if (htext !== null) {
                        const bt = _budgetType(htext);
                        if (bt) {
                            currentBudget = bt;
                            currentL1 = currentL2 = currentL3 = '';
                            continue;
                        }
                    }
                }

                if (_planL3Regex.test(line) && !line.includes('千元')) {
                    currentPlanL3 = line.replace(_planL3Regex, '').trim();
                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }

                // 沒有「編列」、又帶算式符號（= + [] %）的行 → 貸款餘額/利息計算說明，
                // 併回上一列說明，不當新科目也不抓金額
                if (rows.length > 0 && !line.includes('編列') && /[=＝+＋\[\]％%]/.test(line)) {
                    const prev = rows[rows.length - 1];
                    prev.description += '\n' + line;
                    prev.raw += '\n' + line;
                    continue;
                }

                let work = line, prefixKind = 'none';
                let pm = line.match(_numberPrefixRegex);
                if (pm) { work = line.substring(pm[0].length); prefixKind = 'number'; }
                else {
                    pm = line.match(_parenPrefixRegex);
                    if (pm) { work = line.substring(pm[0].length); prefixKind = 'paren'; }
                }

                let levelPref;
                if (prefixKind === 'none') levelPref = [1, 2, 3];
                else if (prefixKind === 'number') levelPref = [2, 3];
                else levelPref = [3];

                let matched = null;
                for (const lvl of levelPref) {
                    matched = _matchAccount(work, it => it.code.length === lvl);
                    if (matched) break;
                }

                if (!matched && prefixKind === 'number') {
                    const normWork = _normalize(work);
                    for (const lvl of levelPref) {
                        for (const item of (_chartByLen[lvl] || [])) {
                            if (item.norm.length < 5) continue;
                            if (normWork.indexOf(item.norm) !== -1) {
                                matched = { code: item.code, name: item.name, rest: '' };
                                break;
                            }
                        }
                        if (matched) break;
                    }
                }

                let rowL1 = currentL1, rowL2 = currentL2, rowL3 = currentL3;
                let description = work;

                if (matched) {
                    const clen = matched.code.length;
                    if (clen === 1) {
                        currentL1 = matched.name;
                        currentL2 = currentL3 = '';
                        rowL1 = matched.name; rowL2 = ''; rowL3 = '';
                        let rest = matched.rest;
                        if (rest.startsWith('－')) {
                            rest = rest.substring(1);
                            const l2m = _matchAccount(rest, it =>
                                it.code.length === 2 && it.code.startsWith(matched.code));
                            if (l2m) {
                                currentL2 = l2m.name;
                                rowL2 = l2m.name;
                                rest = l2m.rest;
                                if (rest.startsWith('－')) rest = rest.substring(1);
                            } else {
                                const l3m = _matchAccount(rest, it =>
                                    it.code.length === 3 && it.code.startsWith(matched.code));
                                if (l3m) {
                                    const l2code = l3m.code.substring(0, 2);
                                    currentL2 = _codeToName.get(l2code) || '';
                                    currentL3 = l3m.name;
                                    rowL2 = currentL2;
                                    rowL3 = l3m.name;
                                    rest = l3m.rest;
                                    if (rest.startsWith('－')) rest = rest.substring(1);
                                }
                            }
                        }
                        description = rest.trim();
                    } else if (clen === 2) {
                        const l1code = matched.code.substring(0, 1);
                        currentL1 = _codeToName.get(l1code) || currentL1;
                        currentL2 = matched.name;
                        currentL3 = '';
                        rowL1 = currentL1; rowL2 = matched.name; rowL3 = '';
                        let rest = matched.rest;
                        if (rest.startsWith('－')) rest = rest.substring(1);
                        description = rest.trim();
                    } else {
                        const l1code = matched.code.substring(0, 1);
                        const l2code = matched.code.substring(0, 2);
                        currentL1 = _codeToName.get(l1code) || currentL1;
                        currentL2 = _codeToName.get(l2code) || currentL2;
                        currentL3 = matched.name;
                        rowL1 = currentL1; rowL2 = currentL2; rowL3 = matched.name;
                        let rest = matched.rest;
                        if (rest.startsWith('－')) rest = rest.substring(1);
                        description = rest.trim();
                    }
                } else if (prefixKind === 'none' && rows.length > 0) {
                    // 無科目、無標號 → 視為上一列說明的接續行，併入前列
                    const prev = rows[rows.length - 1];
                    prev.description += '\n' + line;
                    prev.raw += '\n' + line;
                    if (!prev.amount) prev.amount = _extractAmount(line);
                    continue;
                } else {
                    rowL1 = currentL1; rowL2 = currentL2; rowL3 = '';
                    currentL3 = '';
                    description = work.trim();
                    if (prefixKind === 'none') unmatchedLines.push(line);
                }

                const amount = _extractAmount(line);
                rows.push({
                    fund: currentFund,
                    plan: [currentPlanL1, currentPlanL2, currentPlanL3].filter(Boolean).join(' - ') || '未分類計畫',
                    budget: currentBudget,
                    l1Item: rowL1,
                    l2Item: rowL2,
                    l3Item: rowL3,
                    amount: amount,
                    description: description || line,
                    raw: line
                });
            }

            if (rows.length > 0) {
                displayTable(rows, unmatchedLines);
                const extra = unmatchedLines.length ? `，未匹配科目行 ${unmatchedLines.length} 筆` : '';
                showMessage(ui.statusMessage, `成功解析 ${rows.length} 筆${extra}。`);
            } else {
                showMessage(ui.errorOutput, '無法從文字中解析出資料列。');
            }
        }
        
        function escapeHtml(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        function displayTable(data, unmatchedLines) {
            const container = ui.tableContainer;
            if (!data || data.length === 0) {
                container.innerHTML = "<p>未能從編輯後的文字中生成表格數據。</p>";
                return;
            }

            // Single-pass stats
            let withAmount = 0, l1Only = 0, l2 = 0, l3 = 0;
            for (const r of data) {
                if (r.amount) withAmount++;
                if (r.l3Item) l3++;
                else if (r.l2Item) l2++;
                else if (r.l1Item) l1Only++;
            }

            const statsHTML = `
                <div class="filter-container" style="flex-wrap:wrap;">
                    <label>解析統計:</label>
                    <span>總列數 <b>${data.length}</b></span>
                    <span>含金額 <b>${withAmount}</b></span>
                    <span>L1 <b>${l1Only}</b></span>
                    <span>L2 <b>${l2}</b></span>
                    <span>L3 <b>${l3}</b></span>
                    <span>未匹配 <b>${(unmatchedLines || []).length}</b></span>
                </div>`;

            let unmatchedHTML = '';
            if (unmatchedLines && unmatchedLines.length) {
                const items = unmatchedLines.map(l => `<li>${escapeHtml(l)}</li>`).join('');
                unmatchedHTML = `
                    <details style="margin:10px 0; padding:10px; border:1px solid #f5c6cb; background:#fdf2f3; border-radius:4px;">
                        <summary style="color:#721c24; cursor:pointer;">未匹配到科目的 ${unmatchedLines.length} 行 (點擊展開)</summary>
                        <ul style="margin:8px 0 0 20px;">${items}</ul>
                    </details>`;
            }

            const selectHTML = (id, label, values) => `
                <label>${label}:
                    <select id="${id}" style="padding:8px; border:1px solid #ccc; border-radius:4px; max-width:220px;">
                        <option value="">全部</option>
                        ${values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('')}
                    </select>
                </label>`;
            const uniq = key => [...new Set(data.map(r => r[key]).filter(Boolean))].sort();
            const hasFund = data.some(r => r.fund);
            const hasBudget = data.some(r => r.budget);
            const filterHTML = `
                <div class="filter-container" style="flex-wrap:wrap;">
                    ${hasFund ? selectHTML('filterFund', '基金', uniq('fund')) : ''}
                    ${selectHTML('filterPlan', '計畫名稱', uniq('plan'))}
                    ${hasBudget ? selectHTML('filterBudget', '預算別', uniq('budget')) : ''}
                    ${selectHTML('filterL1', '一級科目', uniq('l1Item'))}
                    ${selectHTML('filterL2', '二級科目', uniq('l2Item'))}
                    ${selectHTML('filterL3', '三級科目', uniq('l3Item'))}
                </div>
                <div class="filter-container">
                    <label for="filterInput">關鍵字篩選:</label>
                    <input type="text" id="filterInput" placeholder="在此輸入文字以篩選表格內容...">
                    <button id="filterBtn" class="btn-secondary">篩選</button>
                    <button id="exportBtn" class="btn-success">匯出 xlsx</button>
                    <span id="filterCount"></span>
                </div>`;

            const rowsHtml = data.map(row => `<tr>
                ${hasFund ? `<td>${escapeHtml(row.fund)}</td>` : ''}
                <td>${escapeHtml(row.plan)}</td>
                ${hasBudget ? `<td>${escapeHtml(row.budget)}</td>` : ''}
                <td>${escapeHtml(row.l1Item)}</td>
                <td>${escapeHtml(row.l2Item)}</td>
                <td>${escapeHtml(row.l3Item)}</td>
                <td style="text-align:right; white-space:nowrap;">${row.amount ? row.amount.toLocaleString() : ""}</td>
                <td style="white-space: pre-wrap;">${escapeHtml(row.raw || '')}</td>
             </tr>`).join('');

            container.innerHTML = statsHTML + unmatchedHTML + filterHTML +
                `<table id="resultTable"><thead><tr>${hasFund ? '<th>基金</th>' : ''}<th style="min-width:280px;">計畫名稱</th>${hasBudget ? '<th>預算別</th>' : ''}<th>一級科目</th><th>二級科目</th><th>三級科目</th><th>金額</th><th style="min-width:360px;">編列說明</th></tr></thead><tbody>${rowsHtml}</tbody></table>`;

            // Cache filter DOM references
            ui.filterInput = document.getElementById('filterInput');
            ui.filterBtn = document.getElementById('filterBtn');
            ui.filterCount = document.getElementById('filterCount');
            ui.resultTable = document.getElementById('resultTable');

            const table = ui.resultTable;
            const rows = table.getElementsByTagName('tr');

            ui.filterCount.textContent = `包括 ${data.length} 列資料`;

            const selectDefs = [
                ...(hasFund ? [['filterFund', 'fund']] : []),
                ['filterPlan', 'plan'],
                ...(hasBudget ? [['filterBudget', 'budget']] : []),
                ['filterL1', 'l1Item'],
                ['filterL2', 'l2Item'], ['filterL3', 'l3Item'],
            ];
            const selects = selectDefs.map(([id, key]) => [document.getElementById(id), key]);

            // 科目有隸屬關係：下層選單只列出符合上層選擇的資料列中出現過的值
            const refreshOptions = (fromLevel) => {
                for (let lvl = fromLevel; lvl < selects.length; lvl++) {
                    const [sel, key] = selects[lvl];
                    const prevValue = sel.value;
                    let subset = data;
                    for (let up = 0; up < lvl; up++) {
                        const [upSel, upKey] = selects[up];
                        if (upSel.value) subset = subset.filter(r => r[upKey] === upSel.value);
                    }
                    const values = [...new Set(subset.map(r => r[key]).filter(Boolean))].sort();
                    sel.innerHTML = `<option value="">全部</option>` +
                        values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
                    sel.value = values.includes(prevValue) ? prevValue : '';
                }
            };

            const rowVisible = (r) => {
                for (const [sel, key] of selects) {
                    if (sel.value && r[key] !== sel.value) return false;
                }
                const keyword = ui.filterInput.value.toLowerCase().trim();
                if (!keyword) return true;
                return [r.fund, r.plan, r.budget, r.l1Item, r.l2Item, r.l3Item, String(r.amount), r.description, r.raw]
                    .join('\n').toLowerCase().includes(keyword);
            };

            const performFilter = () => {
                let visibleCount = 0;
                for (let i = 1; i < rows.length; i++) {
                    const show = rowVisible(data[i - 1]);
                    rows[i].style.display = show ? "" : "none";
                    if (show) visibleCount++;
                }
                ui.filterCount.textContent = `包括 ${visibleCount} 列資料`;
            };

            ui.filterBtn.addEventListener('click', performFilter);
            selects.forEach(([sel], lvl) => sel.addEventListener('change', () => {
                refreshOptions(lvl + 1);
                performFilter();
            }));
            ui.filterInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    performFilter();
                }
            });

            document.getElementById('exportBtn').addEventListener('click', () => {
                const visible = data.filter(rowVisible);
                const aoa = [
                    [...(hasFund ? ['基金'] : []), '計畫名稱', ...(hasBudget ? ['預算別'] : []), '一級科目', '二級科目', '三級科目', '金額 (元)', '編列說明'],
                    ...visible.map(r => [...(hasFund ? [r.fund] : []), r.plan, ...(hasBudget ? [r.budget] : []), r.l1Item, r.l2Item, r.l3Item, r.amount || '', r.raw || '']),
                ];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), '解析結果');
                XLSX.writeFile(wb, '預算書解析結果.xlsx');
            });
        }
    </script>
</body>
</html>
