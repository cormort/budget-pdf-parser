<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>農業特別收入基金預算書pdf解析工具</title>
    <style>
        body { font-family: "Microsoft JhengHei", "微軟正黑體", Arial, sans-serif; margin: 20px; line-height: 1.6; background-color: #f8f9fa; color: #343a40; }
        .container { max-width: 98vw; margin: auto; background: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1, h2 { color: #0056b3; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        p, .step-description { color: #6c757d; }
        .step { border: 1px solid #dee2e6; padding: 20px; border-radius: 5px; margin-top: 25px; }
        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
        #fileInput { display: none; }
        .file-label { display: inline-block; padding: 10px 15px; background-color: #007bff; color: white; border-radius: 5px; cursor: pointer; transition: background-color 0.3s; margin-right: 10px; }
        .file-label:hover { background-color: #0056b3; }
        #fileNameDisplay { display: inline-block; font-style: italic; color: #555; }
        button { padding: 10px 15px; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: background-color 0.3s; }
        .btn-main { background-color: #007bff; }
        .btn-main:hover { background-color: #0056b3; }
        .btn-success { background-color: #28a745; }
        .btn-success:hover { background-color: #218838; }
        .btn-secondary { background-color: #6c757d; }
        .btn-secondary:hover { background-color: #5a6268; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        #output-area { width: 100%; box-sizing: border-box; height: 400px; margin-top: 10px; font-family: "Consolas", "Courier New", monospace; font-size: 14px; border: 1px solid #ced4da; border-radius: 5px; padding: 10px; resize: vertical; }
        #tableContainer { margin-top: 20px; overflow-x: auto; }
        table { border-collapse: collapse; width: 100%; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; vertical-align: top; }
        th { background-color: #e9ecef; color: #495057; font-weight: bold; }
        tbody tr:nth-child(even) { background-color: #f2f6fa; }
        tbody tr:hover { background-color: #e8f0fe; }
        .diff-pos { color: #1a7f37; font-weight: 600; }
        .diff-neg { color: #cf222e; font-weight: 600; }
        .diff-zero { color: #8b949e; }
        .diff-pos::before { content: '▲ '; font-size: 0.75em; }
        .diff-neg::before { content: '▼ '; font-size: 0.75em; }
        /* ── Detail table (#dTable) ── */
        .d-table-wrap { max-height: 72vh; overflow: auto; border: 1px solid #d0d7de; border-radius: 6px; margin-top: 10px; }
        #dTable { border-collapse: separate; border-spacing: 0; width: 100%; }
        #dTable thead th { position: sticky; top: 0; z-index: 2; background: linear-gradient(180deg, #1e3a5f, #17304d); color: #fff; padding: 10px 12px; border: 1px solid #2d5a8a; font-size: 13px; text-shadow: 0 1px 1px rgba(0,0,0,.2); }
        #dTable tbody td { padding: 7px 10px; border-bottom: 1px solid #e8ecf0; border-right: 1px solid #e8ecf0; }
        #dTable tbody td:first-child { border-left: 1px solid #e8ecf0; }
        #dTable tbody tr { background: #fff; }
        #dTable tbody tr:nth-child(even):not(.d-plan) { background: #f7f9fb; }
        #dTable tbody tr:hover { background: #dbeafe !important; }
        #dTable .d-plan { background: #eef3f9 !important; }
        #dTable .d-plan td { font-weight: 600; border-top: 2px solid #b8cce0; }
        #dTable .d-plan .d-name { color: #1a365d; padding-left: 4px; }
        #dTable .d-l1 .d-name { padding-left: 12px; font-weight: 600; }
        #dTable .d-l2 .d-name { padding-left: 28px; }
        #dTable .d-l3 .d-name { padding-left: 44px; color: #64748b; font-size: 13px; }
        #dTable .d-amt { text-align: right; white-space: nowrap; font-variant-numeric: tabular-nums; font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 13px; letter-spacing: -.3px; }
        .message { border-left: 4px solid; padding: 10px 15px; margin: 15px 0; border-radius: 4px; display: none; }
        .status-message { color: #004085; background-color: #cce5ff; border-color: #b8daff; }
        .error-message { color: #721c24; background-color: #f8d7da; border-color: #f5c6cb; }
        .replace-tool { display: flex; align-items: center; gap: 5px; }
        .replace-tool input[type="text"] { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .replace-tool label { display: flex; align-items: center; gap: 5px; font-size: 14px; }
        .filter-container { margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .filter-container input { padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; width: 300px; font-size: 14px; }
        .filter-container label { font-weight: bold; color: #495057; }
        .filter-container button { padding: 8px 15px; }
        #filterCount { color: #0056b3; font-style: italic; }
        .tab-bar { display: flex; gap: 4px; border-bottom: 2px solid #0056b3; margin-bottom: 20px; }
        .tab-btn { padding: 12px 22px; background: #e9ecef; color: #495057; border: none; border-radius: 8px 8px 0 0; font-size: 15px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #0056b3; color: #fff; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>農業特別收入基金預算書pdf解析工具</h1>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('narrative')">用途明細表說明（編列說明）</button>
            <button class="tab-btn" onclick="switchTab('detail')">用途明細表（本年度/上年度預算・前年度決算）</button>
        </div>

        <div id="tab-narrative" class="tab-pane active">
        <div class="step">
            <h2>步驟一：提取 PDF 文字</h2>
            <div class="controls">
                <label for="fileInput" class="file-label">選擇 PDF 檔案</label>
                <input type="file" id="fileInput" accept=".pdf">
                <span id="fileNameDisplay">尚未選擇檔案</span>
                <label>頁 <input type="number" id="pageFrom" min="1" style="width:70px; padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="起"> 到
                <input type="number" id="pageTo" min="1" style="width:70px; padding:8px; border:1px solid #ccc; border-radius:4px;" placeholder="迄"></label>
                <span style="color:#6c757d; font-size:13px;">（留空＝自動抓「基金用途明細表說明」章節）</span>
                <button id="extractBtn" class="btn-main" onclick="extractPdfText()">提取文字</button>
            </div>
        </div>
        
        <div id="statusMessage" class="message status-message"></div>
        <div id="errorOutput" class="message error-message"></div>

        <div class="step">
            <h2>步驟二：文字清理工具箱</h2>
            <p class="step-description">請依序使用以下工具清理文字，或手動編輯。您可以多次使用這些工具。</p>
            <div class="controls">
                <button class="btn-main" onclick="autoClean()" title="依序執行下列三個清理步驟">一鍵清理</button>
                <button class="btn-secondary" onclick="breakLinesByHeadings()">依標號重新斷行</button>
                <button class="btn-secondary" onclick="breaklineBeforeParenthesis()">在 (數字/中文數字) 前換行</button>
                <button class="btn-secondary" onclick="cleanInternalWhitespace()">清理行內空白 (保留縮排)</button>
                <button class="btn-secondary" onclick="stripPageNumbers()">去除頁碼</button>
            </div>
             <div class="controls">
                <div class="replace-tool">
                    <input type="text" id="findText" placeholder="尋找文字或 RegEx 模式">
                    <input type="text" id="replaceText" placeholder="取代為...">
                    <button class="btn-secondary" onclick="findAndReplace()">全局取代</button>
                    <label>
                        <input type="checkbox" id="useRegex"> 使用正規表示式 (RegEx)
                    </label>
                </div>
            </div>
            <textarea id="output-area" placeholder="提取的文字將顯示於此處，您可以在此進行編輯..."></textarea>
        </div>

        <div class="step">
            <h2>步驟三：轉換為表格</h2>
            <p class="step-description">清理完文字後，點擊此按鈕生成最終表格。</p>
            <button id="convertBtn" class="btn-success" onclick="convertToTable()" disabled>轉換為表格</button>
        </div>
        
        <div id="tableContainer">
            <p>最終表格將會顯示於此處。</p>
        </div>
        </div><!-- /tab-narrative -->

        <div id="tab-detail" class="tab-pane">
            <div class="step">
                <h2>數字用途明細表比較</h2>
                <p class="step-description">上傳一或多個「基金用途明細表」（數字版，非說明）PDF——預算書細表含 前年度決算數、本年度預算數、上年度預算數；決算表含 預算數、決算數。可多選檔案，解析後用「來源」下拉選擇要檢視的檔案，依表格計畫＋科目順序呈現。</p>
                <div class="controls">
                    <label for="fileInputD" class="file-label">選擇 PDF 檔案（可多選）</label>
                    <input type="file" id="fileInputD" accept=".pdf" multiple>
                    <span id="fileNameDisplayD">尚未選擇檔案</span>
                    <button id="extractBtnD" class="btn-main" onclick="parseDetailPdf()">解析</button>
                </div>
            </div>
            <div id="statusMessageD" class="message status-message"></div>
            <div id="errorOutputD" class="message error-message"></div>
            <div id="tableContainerD"><p>數字比較表將顯示於此處。</p></div>
        </div><!-- /tab-detail -->
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.worker.min.js';

        // 基金分段標記行：提取時插在基金交界處，通過清理與斷行後仍保留，供轉表格時判定所屬基金
        const FUND_MARK = '⟦基金⟧';

        // ----- DOM cache -----
        const ui = {
            fileInput: document.getElementById('fileInput'),
            fileNameDisplay: document.getElementById('fileNameDisplay'),
            outputArea: document.getElementById('output-area'),
            errorOutput: document.getElementById('errorOutput'),
            statusMessage: document.getElementById('statusMessage'),
            extractBtn: document.getElementById('extractBtn'),
            convertBtn: document.getElementById('convertBtn'),
            tableContainer: document.getElementById('tableContainer'),
            findTextInput: document.getElementById('findText'),
            replaceTextInput: document.getElementById('replaceText'),
            useRegexCheckbox: document.getElementById('useRegex'),
            filterInput: null,
            filterBtn: null,
            filterCount: null,
            resultTable: null,
        };
        ui.fileInput.addEventListener('change', () => { ui.fileNameDisplay.textContent = (ui.fileInput.files && ui.fileInput.files.length > 0) ? `已選擇：${ui.fileInput.files[0].name}` : '尚未選擇檔案'; });
        function showMessage(element, text) { hideMessages(); element.textContent = text; element.style.display = 'block'; }
        function hideMessages() { ui.statusMessage.style.display = 'none'; ui.errorOutput.style.display = 'none'; }

        async function extractPdfText() {
            hideMessages();
            ui.outputArea.value = ''; ui.tableContainer.innerHTML = '<p>最終表格將會顯示於此處。</p>';
            ui.extractBtn.disabled = true; ui.convertBtn.disabled = true;
            if (!ui.fileInput.files || ui.fileInput.files.length === 0) { showMessage(ui.errorOutput, '請先選擇一個 PDF 文件！'); ui.extractBtn.disabled = false; return; }
            showMessage(ui.statusMessage, '正在讀取檔案...');
            const file = ui.fileInput.files[0]; const typedarray = new Uint8Array(await file.arrayBuffer());
            try {
                const pdfDoc = await pdfjsLib.getDocument({ data: typedarray }).promise;
                const SECTION_MARKER = '基金用途明細表說明';
                const Y_TOLERANCE = 3;
                const pageFrom = parseInt(document.getElementById('pageFrom').value, 10) || 0;
                const pageTo = parseInt(document.getElementById('pageTo').value, 10) || 0;
                const useRange = pageFrom >= 1 && pageTo >= pageFrom;
                const firstPage = useRange ? Math.min(pageFrom, pdfDoc.numPages) : 1;
                const lastPage = useRange ? Math.min(pageTo, pdfDoc.numPages) : pdfDoc.numPages;
                const pageLinesList = [];
                for (let i = firstPage; i <= lastPage; i++) {
                    showMessage(ui.statusMessage, `正在處理第 ${i} / ${pdfDoc.numPages} 頁...`);
                    const page = await pdfDoc.getPage(i); const textContent = await page.getTextContent();
                    const items = textContent.items;
                    // O(n) single-pass clustering using sorted-by-y approach
                    const sorted = items.map(it => ({ y: it.transform[5], x: it.transform[4], str: it.str }))
                        .sort((a, b) => b.y - a.y);
                    const groups = [];
                    for (const s of sorted) {
                        if (groups.length > 0 && Math.abs(groups[groups.length - 1].yRef - s.y) <= Y_TOLERANCE) {
                            groups[groups.length - 1].items.push(s);
                        } else {
                            groups.push({ yRef: s.y, items: [s] });
                        }
                    }
                    const lines = groups.map(g => {
                        g.items.sort((a, b) => a.x - b.x);
                        return g.items.map(it => it.str).join('');
                    });
                    pageLinesList.push(lines);
                }
                // 使用者指定頁碼範圍時直接採用；否則只保留頁首含「基金用途明細表說明」的頁
                // （頁首需整行等於標記（去空白），避免誤抓目次頁；無任何頁符合時退回全部頁面）。
                const inSection = lines => lines.slice(0, 6).some(ln => ln.replace(/[\s　]/g, '') === SECTION_MARKER);
                let usedPages, sectionNote;
                if (useRange) {
                    usedPages = pageLinesList;
                    sectionNote = `（第 ${firstPage} 到 ${lastPage} 頁，共 ${usedPages.length} 頁）`;
                } else {
                    const selected = pageLinesList.filter(inSection);
                    usedPages = selected.length ? selected : pageLinesList;
                    sectionNote = selected.length ? `（自動篩選出「${SECTION_MARKER}」章節 ${selected.length} / ${pdfDoc.numPages} 頁）` : '';
                }
                // 每頁頁首「基金用途明細表說明」上一行即基金名稱；基金交界處插入標記行
                const fundOfPage = lines => {
                    const head = lines.slice(0, 6).map(l => l.replace(/[\s　]/g, ''));
                    const i = head.indexOf(SECTION_MARKER);
                    return (i >= 1 && head[i - 1]) ? head[i - 1] : '';
                };
                let prevFund = '';
                const outParts = [];
                for (const lines of usedPages) {
                    const f = fundOfPage(lines) || prevFund;
                    if (f && f !== prevFund) outParts.push(FUND_MARK + f);
                    prevFund = f;
                    outParts.push(lines.join('\n'));
                }
                ui.outputArea.value = outParts.join('\n').trim();
                const funds = [...new Set([...ui.outputArea.value.matchAll(new RegExp('^' + FUND_MARK + '(.+)$', 'gm'))].map(m => m[1]))];
                const fundNote = funds.length > 1 ? `（辨識出 ${funds.length} 個基金：${funds.join('、')}）` : (funds.length === 1 ? `（基金：${funds[0]}）` : '');
                showMessage(ui.statusMessage, `提取完成！${sectionNote}${fundNote}您現在可以在下方的文字區進行編輯與清理。`);
                ui.convertBtn.disabled = false;
            } catch (err) {
                console.error("提取 PDF 時發生錯誤:", err);
                showMessage(ui.errorOutput, `提取 PDF 時發生錯誤：${err.message}${err.name === 'PasswordException' ? ' (文件可能已加密)' : ''}`);
            } finally { ui.extractBtn.disabled = false; }
        }

        function findAndReplace() {
            const findText = ui.findTextInput.value; const replaceText = ui.replaceTextInput.value; const useRegex = ui.useRegexCheckbox.checked;
            if (!findText) { showMessage(ui.errorOutput, "「尋找文字」欄位不能為空。"); return; }
            const originalText = ui.outputArea.value; let regex;
            try {
                if (useRegex) { regex = new RegExp(findText, 'g'); } else { regex = new RegExp(findText.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&'), 'g'); }
                const newText = originalText.replace(regex, replaceText);
                const replacementsCount = (originalText.match(regex) || []).length;
                ui.outputArea.value = newText;
                showMessage(ui.statusMessage, `完成！共取代了 ${replacementsCount} 處。`);
            } catch (e) { showMessage(ui.errorOutput, "正規表示式錯誤：" + e.message); }
        }

        function splitAtPeriodOutsideParens(text) {
            let depth = 0;
            const out = [];
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                if (c === '（' || c === '(') depth++;
                else if ((c === '）' || c === ')') && depth > 0) depth--;
                out.push(c);
                if (c === '。' && depth === 0) out.push('\n');
            }
            return out.join('');
        }

        function reflowBlock(block) {
            let singleLine = block.replace(/\n/g, ' ').replace(/\s+/g, ' ');
            const headingRegex = new RegExp(
                '(?<=^|\\s)(' +
                    '[壹貳參肆伍陸柒捌玖拾]、|' +
                    '[一二三四五六七八九十]、|' +
                    '[^\\s－，。：、]+(?:、[^\\s－，。：、]+)*－|' +
                    '\\d+\\.(?!\\d)' +
                ')',
                'g'
            );
            singleLine = singleLine.replace(headingRegex, '\n$1');
            singleLine = singleLine.replace(/\n([壹貳參肆伍陸柒捌玖拾]、)/g, '\n\n$1');
            singleLine = splitAtPeriodOutsideParens(singleLine);
            return singleLine.trim();
        }

        function breakLinesByHeadings() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            // 基金標記行不參與 reflow：以它為界分段各自重新斷行，標記行原樣保留
            const out = [];
            let buf = [];
            for (const line of text.split('\n')) {
                if (line.startsWith(FUND_MARK)) {
                    if (buf.length) { out.push(reflowBlock(buf.join('\n'))); buf = []; }
                    out.push(line);
                } else {
                    buf.push(line);
                }
            }
            if (buf.length) out.push(reflowBlock(buf.join('\n')));
            ui.outputArea.value = out.filter(s => s !== '').join('\n');
            showMessage(ui.statusMessage, "已根據標號與句末「。」重新斷行 (v36)。");
        }

        function breaklineBeforeParenthesis() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            const regex = /(\(\d{1,2}\)|\([一二三四五六七八九十]+\))/g;
            ui.outputArea.value = text.replace(regex, '\n  $1');
            showMessage(ui.statusMessage, "已在所有 (1-99的數字/中文數字) 前插入換行與縮排。");
        }

        function cleanInternalWhitespace() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            const lines = text.split('\n');
            const cleanedLines = lines.map(line => {
                const match = line.match(/^(\s*)/); const leadingWhitespace = match ? match[1] : '';
                const content = line.substring(leadingWhitespace.length); const cleanedContent = content.replace(/\s+/g, ' ').trim();
                return leadingWhitespace + cleanedContent;
            });
            ui.outputArea.value = cleanedLines.join('\n');
            showMessage(ui.statusMessage, "已清理行內多餘空白，並保留行首縮排。");
        }

        function stripPageNumbers() {
            let text = ui.outputArea.value; if (!text) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            const lines = text.split('\n');
            const pageRegex = /^[\s　]*[0-9０-９]+(?:[-－‐–—][0-9０-９]+)?[\s　]*$/;
            const dateHeaderRegex = /^中華民國[\s　]*[0-9０-９]+[\s　]*年度$/;
            const pureCjkRegex = /^[一-鿿]{2,10}$/;
            // 機關名/基金名等頁首行 = 短純中文行且整份重複出現 >= 3 次，動態偵測不寫死
            const counts = {};
            for (const line of lines) {
                const c = line.trim().replace(/[\s　]/g, '');
                if (pureCjkRegex.test(c)) counts[c] = (counts[c] || 0) + 1;
            }
            let count = 0;
            const filteredLines = lines.filter(line => {
                const t = line.trim();
                const c = t.replace(/[\s　]/g, '');
                if (pageRegex.test(t) || c === '基金用途明細表說明' || dateHeaderRegex.test(c)
                    || (pureCjkRegex.test(c) && counts[c] >= 3)) { count++; return false; }
                return true;
            });
            ui.outputArea.value = filteredLines.join('\n');
            showMessage(ui.statusMessage, `已去除 ${count} 行頁碼與頁首標題。`);
        }

        function autoClean() {
            if (!ui.outputArea.value) { showMessage(ui.errorOutput, "文字區沒有內容。"); return; }
            stripPageNumbers();
            breakLinesByHeadings();
            breaklineBeforeParenthesis();
            cleanInternalWhitespace();
            showMessage(ui.statusMessage, "已完成一鍵清理 (去除頁碼 → 依標號斷行 → 在括號前換行 → 清理行內空白)。");
        }

        // ----- Account chart (built once at module level) -----
        const _DROPS_RE = /[\s、及－\-]/;
        const _normalize = (str) => str
            .replace(/（[^）]*）/g, '')
            .replace(/\([^)]*\)/g, '')
            .replace(/[\s、及－\-]/g, '');

        const _walkMatch = (line, normName) => {
            let pos = 0, consumed = 0, depth = 0;
            while (pos < line.length && consumed < normName.length) {
                const c = line[pos];
                if (c === '（' || c === '(') { depth++; pos++; continue; }
                if (c === '）' || c === ')') { if (depth > 0) depth--; pos++; continue; }
                if (depth > 0) { pos++; continue; }
                if (_DROPS_RE.test(c)) { pos++; continue; }
                consumed++; pos++;
            }

        const _codeToName = new Map();

            const parts = line.trim().split(/\s+/);

        _chart.sort((a, b) => b.norm.length - a.norm.length);

        const _matchAccount = (line, predicate) => {
            const normLine = _normalize(line);

                if (!normLine.startsWith(item.norm)) continue;

        const _amountPatterns = [
            /合共\s*([\d,]+)\s*千元/,
            /編列\s*([\d,]+)\s*千元/,
            /([\d,]+)\s*千元/,
        ];
        const _extractAmount = (line) => {
            if (!line) return '';
            for (const p of _amountPatterns) {
                const m = line.match(p);
                if (m && m[1]) {
                    const n = parseInt(m[1].replace(/,/g, ''), 10);
                    if (!isNaN(n)) return n * 1000;
                }

            return '';

        const _planL3Regex = /^[（(][一二三四五六七八九十]+[）)]/;

            const t = s.trim();
            if (t === '原年度預算') return '原年度預算';

        function convertToTable() {

            let currentFund = '';
            let currentPlanL1 = '', currentPlanL2 = '', currentPlanL3 = '', currentBudget = '';
            let currentL1 = '', currentL2 = '', currentL3 = '';
            const rows = [];
            const unmatchedLines = [];

            const lines = text.split('\n').filter(l => l.trim() !== '');

            for (const raw of lines) {
                const line = raw.trim();

                if (line.startsWith(FUND_MARK)) {
                    currentFund = line.substring(FUND_MARK.length).trim();
                    currentPlanL1 = currentPlanL2 = currentPlanL3 = currentBudget = '';
                    currentL1 = currentL2 = currentL3 = '';

                }

                if (_planL1Regex.test(line)) {
                    currentPlanL1 = line.replace(_planL1Regex, '').trim();

                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }
                if (_planL2Regex.test(line)) {
                    currentPlanL2 = line.replace(_planL2Regex, '').trim();
                    currentPlanL3 = currentBudget = '';
                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }

                // 預算別標題（(一)原年度預算 / (二)因應…災後復原重建，或 1./2. 形式）
                if (!line.includes('千元')) {
                    const mcn = line.match(_planL3Regex);
                    const mnum = line.match(_numberPrefixRegex);
                    let htext = null;
                    if (mcn) htext = line.substring(mcn[0].length).trim();
                    else if (mnum) htext = line.substring(mnum[0].length).trim();
                    if (htext !== null) {
                        const bt = _budgetType(htext);
                        if (bt) {
                            currentBudget = bt;
                            currentL1 = currentL2 = currentL3 = '';
                            continue;

                    }

                if (_planL3Regex.test(line) && !line.includes('千元')) {

                    currentL1 = currentL2 = currentL3 = '';
                    continue;
                }

                // 沒有「編列」、又帶算式符號（= + [] %）的行 → 貸款餘額/利息計算說明，
                // 併回上一列說明，不當新科目也不抓金額
                if (rows.length > 0 && !line.includes('編列') && /[=＝+＋\[\]％%]/.test(line)) {
                    const prev = rows[rows.length - 1];
                    prev.description += '\n' + line;
                    prev.raw += '\n' + line;
                    continue;

                let work = line, prefixKind = 'none';
                let pm = line.match(_numberPrefixRegex);

                    if (pm) { work = line.substring(pm[0].length); prefixKind = 'paren'; }

                if (prefixKind === 'none') levelPref = [1, 2, 3];
                else if (prefixKind === 'number') levelPref = [2, 3];
                else levelPref = [3];

                for (const lvl of levelPref) {

                                matched = { code: item.code, name: item.name, rest: '' };
                                break;
                            }
                        }
                        if (matched) break;
                    }
                }

                let rowL1 = currentL1, rowL2 = currentL2, rowL3 = currentL3;
                let description = work;

                if (matched) {
                    const clen = matched.code.length;
                    if (clen === 1) {
                        currentL1 = matched.name;
                        currentL2 = currentL3 = '';
                        rowL1 = matched.name; rowL2 = ''; rowL3 = '';
                        let rest = matched.rest;
                        if (rest.startsWith('－')) {
                            rest = rest.substring(1);
                            const l2m = _matchAccount(rest, it =>
                                it.code.length === 2 && it.code.startsWith(matched.code));
                            if (l2m) {
                                currentL2 = l2m.name;
                                rowL2 = l2m.name;
                                rest = l2m.rest;
                                if (rest.startsWith('－')) rest = rest.substring(1);
                            } else {
                                const l3m = _matchAccount(rest, it =>
                                    it.code.length === 3 && it.code.startsWith(matched.code));
                                if (l3m) {
                                    const l2code = l3m.code.substring(0, 2);
                                    currentL2 = _codeToName.get(l2code) || '';
                                    currentL3 = l3m.name;
                                    rowL2 = currentL2;
                                    rowL3 = l3m.name;
                                    rest = l3m.rest;
                                    if (rest.startsWith('－')) rest = rest.substring(1);
                                }
                            }
                        }
                        description = rest.trim();
                    } else if (clen === 2) {
                        const l1code = matched.code.substring(0, 1);
                        currentL1 = _codeToName.get(l1code) || currentL1;
                        currentL2 = matched.name;
                        currentL3 = '';
                        rowL1 = currentL1; rowL2 = matched.name; rowL3 = '';
                        let rest = matched.rest;
                        if (rest.startsWith('－')) rest = rest.substring(1);
                        description = rest.trim();
                    } else {
                        const l1code = matched.code.substring(0, 1);
                        const l2code = matched.code.substring(0, 2);
                        currentL1 = _codeToName.get(l1code) || currentL1;
                        currentL2 = _codeToName.get(l2code) || currentL2;
                        currentL3 = matched.name;
                        rowL1 = currentL1; rowL2 = currentL2; rowL3 = matched.name;
                        let rest = matched.rest;
                        if (rest.startsWith('－')) rest = rest.substring(1);
                        description = rest.trim();
                    }

                    prev.raw += '\n' + line;
                    if (!prev.amount) prev.amount = _extractAmount(line);

                    rowL1 = currentL1; rowL2 = currentL2; rowL3 = '';
                    currentL3 = '';
                    description = work.trim();

                }

                const amount = _extractAmount(line);
                rows.push({
                    fund: currentFund,
                    plan: [currentPlanL1, currentPlanL2, currentPlanL3].filter(Boolean).join(' - ') || '未分類計畫',
                    planTop: currentPlanL1 || '未分類計畫',

                    budget: currentBudget,

                    l2Item: rowL2,

                unmatchedHTML = `
                    <details style="margin:10px 0; padding:10px; border:1px solid #f5c6cb; background:#fdf2f3; border-radius:4px;">
                        <summary style="color:#721c24; cursor:pointer;">未匹配到科目的 ${unmatchedLines.length} 行 (點擊展開)</summary>
                        <ul style="margin:8px 0 0 20px;">${items}</ul>
                    </details>`;
            }

            const selectHTML = (id, label, values) => `
                <label>${label}:
                    <select id="${id}" style="padding:8px; border:1px solid #ccc; border-radius:4px; max-width:220px;">
                        <option value="">全部</option>
                        ${values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('')}
                    </select>
                </label>`;
            const uniq = key => [...new Set(data.map(r => r[key]).filter(Boolean))].sort();
            const hasFund = data.some(r => r.fund);
            const hasBudget = data.some(r => r.budget);
            const filterHTML = `
                <div class="filter-container" style="flex-wrap:wrap;">
                    ${hasFund ? selectHTML('filterFund', '基金', uniq('fund')) : ''}
                    ${selectHTML('filterPlanTop', '計畫', uniq('planTop'))}
                    ${selectHTML('filterPlanSub', '子計畫', uniq('planSub'))}
                    ${hasBudget ? selectHTML('filterBudget', '預算別', uniq('budget')) : ''}
                    ${selectHTML('filterL1', '一級科目', uniq('l1Item'))}
                    ${selectHTML('filterL2', '二級科目', uniq('l2Item'))}
                    ${selectHTML('filterL3', '三級科目', uniq('l3Item'))}
                </div>
                <div class="filter-container">
                    <label for="filterInput">關鍵字篩選:</label>
                    <input type="text" id="filterInput" placeholder="在此輸入文字以篩選表格內容...">
                    <button id="filterBtn" class="btn-secondary">篩選</button>
                    <button id="exportBtn" class="btn-success">匯出 xlsx</button>
                    <span id="filterCount"></span>
                </div>`;

            const rowsHtml = data.map(row => `<tr>
                ${hasFund ? `<td style="white-space:nowrap;">${escapeHtml(row.fund)}</td>` : ''}
                <td>${escapeHtml(row.plan)}</td>
                ${hasBudget ? `<td style="white-space:nowrap;">${escapeHtml(row.budget)}</td>` : ''}
                <td>${escapeHtml(row.l1Item)}</td>
                <td>${escapeHtml(row.l2Item)}</td>
                <td>${escapeHtml(row.l3Item)}</td>
                <td style="text-align:right; white-space:nowrap;">${row.amount ? row.amount.toLocaleString() : ""}</td>
                <td style="white-space: pre-wrap;">${escapeHtml(row.raw || '')}</td>
             </tr>`).join('');

            container.innerHTML = statsHTML + unmatchedHTML + filterHTML +
                `<table id="resultTable"><thead><tr>${hasFund ? '<th style="white-space:nowrap;">基金</th>' : ''}<th style="min-width:220px;">計畫名稱</th>${hasBudget ? '<th style="white-space:nowrap;">預算別</th>' : ''}<th style="min-width:5.5em;">一級科目</th><th style="min-width:7em;">二級科目</th><th style="min-width:7em;">三級科目</th><th style="white-space:nowrap;">金額</th><th style="min-width:320px;">編列說明</th></tr></thead><tbody>${rowsHtml}</tbody></table>`;

            // Cache filter DOM references
            ui.filterInput = document.getElementById('filterInput');
            ui.filterBtn = document.getElementById('filterBtn');
            ui.filterCount = document.getElementById('filterCount');
            ui.resultTable = document.getElementById('resultTable');

            const table = ui.resultTable;
            const rows = table.getElementsByTagName('tr');

            ui.filterCount.textContent = `包括 ${data.length} 列資料`;

            const selectDefs = [
                ...(hasFund ? [['filterFund', 'fund']] : []),
                ['filterPlanTop', 'planTop'], ['filterPlanSub', 'planSub'],
                ...(hasBudget ? [['filterBudget', 'budget']] : []),
                ['filterL1', 'l1Item'],
                ['filterL2', 'l2Item'], ['filterL3', 'l3Item'],
            ];
            const selects = selectDefs.map(([id, key]) => [document.getElementById(id), key]);

            // 科目有隸屬關係：下層選單只列出符合上層選擇的資料列中出現過的值
            const refreshOptions = (fromLevel) => {
                for (let lvl = fromLevel; lvl < selects.length; lvl++) {
                    const [sel, key] = selects[lvl];
                    const prevValue = sel.value;
                    let subset = data;
                    for (let up = 0; up < lvl; up++) {
                        const [upSel, upKey] = selects[up];
                        if (upSel.value) subset = subset.filter(r => r[upKey] === upSel.value);
                    }
                    const values = [...new Set(subset.map(r => r[key]).filter(Boolean))].sort();
                    sel.innerHTML = `<option value="">全部</option>` +
                        values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
                    sel.value = values.includes(prevValue) ? prevValue : '';
                }
            };

            const rowVisible = (r) => {
                for (const [sel, key] of selects) {
                    if (sel.value && r[key] !== sel.value) return false;
                }
                const keyword = ui.filterInput.value.toLowerCase().trim();
                if (!keyword) return true;
                return [r.fund, r.plan, r.budget, r.l1Item, r.l2Item, r.l3Item, String(r.amount), r.description, r.raw]
                    .join('\n').toLowerCase().includes(keyword);
            };

            const performFilter = () => {
                let visibleCount = 0;
                for (let i = 1; i < rows.length; i++) {
                    const show = rowVisible(data[i - 1]);
                    rows[i].style.display = show ? "" : "none";
                    if (show) visibleCount++;
                }
                ui.filterCount.textContent = `包括 ${visibleCount} 列資料`;
            };

            ui.filterBtn.addEventListener('click', performFilter);
            selects.forEach(([sel], lvl) => sel.addEventListener('change', () => {
                refreshOptions(lvl + 1);
                performFilter();
            }));
            ui.filterInput.addEventListener('keydown', function(event) {
                if (event.key === 'Enter') {
                    event.preventDefault();
                    performFilter();
                }
            });

            document.getElementById('exportBtn').addEventListener('click', () => {
                const visible = data.filter(rowVisible);
                const aoa = [
                    [...(hasFund ? ['基金'] : []), '計畫名稱', ...(hasBudget ? ['預算別'] : []), '一級科目', '二級科目', '三級科目', '金額 (元)', '編列說明'],
                    ...visible.map(r => [...(hasFund ? [r.fund] : []), r.plan, ...(hasBudget ? [r.budget] : []), r.l1Item, r.l2Item, r.l3Item, r.amount || '', r.raw || '']),
                ];
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), '解析結果');
                XLSX.writeFile(wb, '預算書解析結果.xlsx');
            });
        }

        // ===== 分頁 =====
        function switchTab(name) {
            document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            if (window.event && window.event.target) window.event.target.classList.add('active');
        }

        // ===== 數字用途明細表解析（本年度/上年度預算・前年度決算） =====
        const _DETAIL_MARKER = '基金用途明細表';
        const _numRe = /^[\d,]+$/;
        document.getElementById('fileInputD').addEventListener('change', () => {
            const f = document.getElementById('fileInputD').files;
            document.getElementById('fileNameDisplayD').textContent = (f && f.length) ? `已選擇 ${f.length} 檔：${[...f].map(x => x.name).join('、')}` : '尚未選擇檔案';
        });

        function _expandItem(it) {
            // pdf.js 常把相鄰數字合併成一個含空格的 item；依 width 依字元比例拆回子 token
            const s = it.str;
            const x = it.transform[4], w = it.width || 0;
            if (!/\S\s+\S/.test(s)) return [{ x, str: s }];
            const out = [];
            const re = /\S+/g; let m;
            while ((m = re.exec(s)) !== null) {
                out.push({ x: x + (s.length ? (m.index / s.length) * w : 0), str: m[0] });
            }
            return out;
        }

        function _detailLines(items) {
            // 依 y 分行；每行 [{x,str}] 依 x 排序
            const Y_TOL = 3;
            const sorted = items.flatMap(it => _expandItem(it).map(sub => ({ x: sub.x, y: it.transform[5], str: sub.str })))
                .sort((a, b) => b.y - a.y);
            const groups = [];
            for (const s of sorted) {
                const g = groups.length ? groups[groups.length - 1] : null;
                if (g && Math.abs(g.y - s.y) <= Y_TOL) g.items.push(s);
                else groups.push({ y: s.y, items: [s] });
            }
            return groups.map(g => g.items.sort((a, b) => a.x - b.x));
        }

        function _detailColumns(lines) {
            const pos = {};
            for (const line of lines.slice(0, 14)) {
                for (const it of line) {
                    const t = it.str.trim();
                    if (t && !(t in pos)) pos[t] = it.x;
                }
            }
            // 表頭 token 可能是完整詞、拆兩行、或逐字；用多形式尋找欄位錨點 x
            const px = (...keys) => { for (const k of keys) if (k in pos) return pos[k]; return null; };
            const O = 20;
            const rightCut = px('計畫內容說明', '說', '備註', '備') ?? 9999;
            const xF = px('前年度決算數', '前年度', '前');
            const xB = px('本年度預算數', '本年度', '本');
            const xU = px('上年度預算數', '上年度', '上');
            let cols = null;
            if (xB != null || xU != null) {  // 預算書細表(3欄)：有本/上年度即判定，避免單字「決/預」誤觸發決算
                cols = {};
                if (xB != null) cols['本年度預算'] = xB + O;
                if (xU != null) cols['上年度預算'] = xU + O;
                if (xF != null) cols['前年度決算'] = xF + O;
            } else {  // 決算表(2欄)：預算數、決算數
                const xP = px('預算數', '預'), xD = px('決算數', '決');
                if (xP != null && xD != null) cols = { '預算數': xP + O, '決算數': xD + O };
            }
            // 名稱右界：第一個在名稱右側的金額欄(預算書=本年度預算；決算表=預算數)，精準排除右側說明欄
            let nameMax = rightCut;
            if (cols) {
                if ('本年度預算' in cols) nameMax = cols['本年度預算'] - 20;
                else nameMax = Math.min(...Object.values(cols)) - 20;
            }
            return { cols, rightCut: nameMax };
        }

        const _dashOnly = /^[-－–—]+$/;
        function _matchAccountLoose(name) {
            const exact = _matchAccount(name);
            // 精確比對若把整個名稱吃乾淨（rest 無中文殘餘）就採用
            if (exact && !_normalize(exact.rest)) return exact;
            // 否則名稱可能是科目全名的開頭（PDF 換行截斷）→ 找以此名為前綴、能吃完整名的科目
            const nn = _normalize(name);
            if (nn.length >= 4) {
                for (const item of _chart) {  // _chart 由長到短
                    if (item.norm.startsWith(nn)) return { code: item.code, name: item.name, rest: '' };
                }
            }
            return exact;  // 退回精確比對
        }

        function _detailAssign(line, cols, rightCut) {
            const nameParts = []; const amounts = {};
            const entries = Object.entries(cols);
            for (const it of line) {
                const t = it.str.trim();
                if (!t || _dashOnly.test(t)) continue;  // 空金額佔位「-」不計
                if (/^[-－]?[\d,]+(\.\d+)?$/.test(t)) {  // 數字類(含決算表的比較增減金額、%)
                    if (t.includes('.')) continue;  // 小數＝百分比欄，忽略(不進金額也不進名稱)
                    let best = null, bd = 1e9;
                    for (const [k, cx] of entries) { const d = Math.abs(cx - it.x); if (d < bd) { bd = d; best = k; } }
                    if (best && bd <= 45 && !(best in amounts)) {  // 太遠(比較增減金額)不歸欄
                        const n = parseInt(t.replace(/,/g, ''), 10);
                        amounts[best] = isNaN(n) ? null : n;
                    }
                } else if (it.x < rightCut - 8) {
                    nameParts.push([it.x, t]);
                }
            }
            nameParts.sort((a, b) => a[0] - b[0]);
            return { name: nameParts.map(p => p[1]).join(''), amounts };
        }

        let _detailSources = [];

        async function parseDetailPdf() {
            const el = id => document.getElementById(id);
            const show = (n, t) => { el('statusMessageD').style.display = 'none'; el('errorOutputD').style.display = 'none'; el(n).textContent = t; el(n).style.display = 'block'; };
            const fi = el('fileInputD');
            if (!fi.files || !fi.files.length) { show('errorOutputD', '請先選擇 PDF。'); return; }
            el('extractBtnD').disabled = true;
            try {
                _detailSources = [];
                for (const file of fi.files) {
                    const buf = new Uint8Array(await file.arrayBuffer());
                    const doc = await pdfjsLib.getDocument({ data: buf }).promise;
                    const res = await parseDetailDoc(doc, (i, n) => show('statusMessageD', `${file.name}：第 ${i}/${n} 頁...`));
                    if (res.rows.length) { res.fileName = file.name; _detailSources.push(res); }
                }
                if (!_detailSources.length) { show('errorOutputD', '找不到數字版「基金用途明細表」細表頁（需含科目）。'); return; }
                _detailView = { merged: false, idx: 0 };
                renderDetail();
                show('statusMessageD', `完成：載入 ${_detailSources.length} 個來源。單一檢視用「來源」下拉；多本同單位可勾「並排比較」。`);
            } catch (e) { console.error(e); show('errorOutputD', '解析失敗：' + e.message); }
            finally { el('extractBtnD').disabled = false; }
        }

        let _detailView = { merged: false, idx: 0 };
        function showDetailSource(idx) { _detailView = { merged: false, idx }; renderDetail(); }
        function renderDetail() {
            if (_detailView.merged) {
                const m = buildMergedSources();
                displayDetailTable(m.rows, m.amtCols, { unit: m.unit, merged: true });
            } else {
                const s = _detailSources[_detailView.idx];
                displayDetailTable(s.rows, s.amtCols, { unit: s.unit, idx: _detailView.idx, year: s.year });
            }
        }

        async function parseDetailDoc(pdfDoc, onProgress) {
            const rows = [];
            let label = '', fmt = null, year = null, curFund = null, st = null;
            for (let i = 1; i <= pdfDoc.numPages; i++) {
                if (onProgress) onProgress(i, pdfDoc.numPages);
                const page = await pdfDoc.getPage(i);
                const items = (await page.getTextContent()).items;
                const lines = _detailLines(items);
                const head = lines.slice(0, 6).map(l => l.map(it => it.str).join('').replace(/[\s　]/g, ''));
                if (!head.some(h => h === _DETAIL_MARKER)) continue;
                const { cols, rightCut } = _detailColumns(lines);
                if (!cols) continue;
                const merged = _mergeWrapped(lines, cols, rightCut);
                // 細表頁 = 含至少一個科目列（排除只有計畫的彙總頁）；不再靠特定科目關鍵字，避免漏基金/計畫
                const hasSubject = merged.some(a => Object.keys(a.amounts).length > 0
                    && !_planL1Regex.test(a.name) && !_planL2Regex.test(a.name) && !_planL3Regex.test(a.name)
                    && _matchAccountLoose(a.name));
                if (!hasSubject) continue;
                const mi = head.findIndex(h => h === _DETAIL_MARKER);
                const fund = mi >= 1 ? head[mi - 1] : '';
                const pageFmt = '決算數' in cols ? 'decal' : 'budget';
                if (fmt === null) {  // 鎖定第一頁的格式，避免同一檔混到兩種版面
                    fmt = pageFmt;
                    const ym = head.join('').match(/中華民國([0-9]+)年度/);
                    year = ym ? parseInt(ym[1], 10) : null;
                    label = (year || '') + (fmt === 'decal' ? '決算' : '預算');
                } else if (pageFmt !== fmt) {
                    continue;
                }
                if (fund !== curFund) { st = { p1: '', p2: '', p3: '', l1: '', l2: '', l3: '' }; curFund = fund; }
                _parseDetailItems(merged, fund, rows, st, pageFmt === 'decal');  // 跨頁沿用同基金的計畫脈絡
            }
            const amtCols = [];
            for (const r of rows) for (const c of Object.keys(r.amounts)) if (!amtCols.includes(c)) amtCols.push(c);
            const unit = fmt === 'decal' ? '元' : '千元';
            return { label: label || '來源', rows, amtCols, unit, year, fmt };
        }

        // 把來源欄名換算成絕對年度標籤（供跨檔並排合併）
        function _yearCol(year, col) {
            if (year == null) return col;
            const map = { '本年度預算': [year, '預算'], '上年度預算': [year - 1, '預算'], '前年度決算': [year - 2, '決算'], '預算數': [year, '預算'], '決算數': [year, '決算'] };
            const m = map[col];
            return m ? `${m[0]}${m[1]}` : col;
        }

        // 合併所有來源：統一單位為千元(決算元→÷1000四捨五入)、以年度標籤為欄、(基金|計畫|科目) 為鍵
        function buildMergedSources() {
            const key = r => `${r.fund}|${r.plan}|${r.name}`;
            const toThousand = (s, v) => (v == null ? null : (s.unit === '元' ? Math.round(v / 1000) : v));
            const amtCols = [], map = new Map(), order = [];
            for (const s of _detailSources) {
                for (const r of s.rows) {
                    const k = key(r);
                    let row = map.get(k);
                    if (!row) { row = { fund: r.fund, plan: r.plan, level: r.level, name: r.name, amounts: {} }; map.set(k, row); order.push(k); }
                    for (const [c, v] of Object.entries(r.amounts)) {
                        const yc = _yearCol(s.year, c);
                        if (!amtCols.includes(yc)) amtCols.push(yc);
                        if (row.amounts[yc] == null) row.amounts[yc] = toThousand(s, v);
                    }
                }
            }
            amtCols.sort();  // 年度標籤排序（113決算 < 114預算 < 114決算 < 115預算…）
            return { rows: order.map(k => map.get(k)), amtCols, unit: '千元', count: _detailSources.length };
        }

        const _HEAD_NAMES = ['業務計畫及用途別科目', '計畫內容說明', '基金用途', '前年度', '本年度', '上年度', '前年度決算數', '本年度預算數', '上年度預算數'];
        function _mergeWrapped(lines, cols, rightCut) {
            // 換行接續行(無金額、非計畫標號、非科目、非表頭)併回上一列名稱，修正長名被截斷
            const items = [];
            for (const line of lines) {
                const a = _detailAssign(line, cols, rightCut);
                if (!a.name) continue;
                const isCont = Object.keys(a.amounts).length === 0
                    && !_planL1Regex.test(a.name) && !_planL2Regex.test(a.name) && !_planL3Regex.test(a.name)
                    && !_HEAD_NAMES.includes(a.name) && !_matchAccountLoose(a.name);
                if (isCont && items.length) items[items.length - 1].name += a.name;
                else items.push(a);
            }
            return items;
        }

        function _parseDetailItems(items, fund, out, st, isDecal) {
            for (const { name, amounts } of items) {
                if (!name || _HEAD_NAMES.includes(name)) continue;
                if (/預算數|決算數|比較增減|計畫內容/.test(name)) continue;  // 頁尾說明註解/表頭殘留
                const hasAmt = Object.keys(amounts).length > 0;
                let level, displayName = name;
                // 決算表計畫無壹/一標號，且頁尾註解常以 一、二、開頭 → 不用標號判計畫，改靠科目表與 fallback
                if (!isDecal && _planL1Regex.test(name)) { st.p1 = name.replace(_planL1Regex, '').trim(); st.p2 = st.p3 = st.l1 = st.l2 = st.l3 = ''; level = '計畫'; }
                else if (!isDecal && _planL2Regex.test(name)) { st.p2 = name.replace(_planL2Regex, '').trim(); st.p3 = st.l1 = st.l2 = st.l3 = ''; level = '計畫'; }
                else if (!isDecal && _planL3Regex.test(name)) { st.p3 = name.replace(_planL3Regex, '').trim(); st.l1 = st.l2 = st.l3 = ''; level = '計畫'; }
                else {
                    const m = _matchAccountLoose(name);
                    if (m) {
                        const clen = m.code.length;
                        if (clen === 1) { st.l1 = m.name; st.l2 = st.l3 = ''; }
                        else if (clen === 2) { st.l1 = _codeToName.get(m.code.substring(0, 1)) || st.l1; st.l2 = m.name; st.l3 = ''; }
                        else { st.l1 = _codeToName.get(m.code.substring(0, 1)) || st.l1; st.l2 = _codeToName.get(m.code.substring(0, 2)) || st.l2; st.l3 = m.name; }
                        level = '科目';
                        displayName = m.name;  // 顯示科目表正式全名（修正 PDF 換行截斷）
                    } else if (hasAmt && /(計畫|基金|支出)$/.test(name)) {
                        // 決算表計畫無壹/一標號：有金額且像計畫名 → 當計畫
                        st.p1 = name; st.p2 = st.p3 = st.l1 = st.l2 = st.l3 = ''; level = '計畫';
                    } else {
                        continue;  // 無金額又無法歸類 → 換行殘屑/小計，略過
                    }
                }
                out.push({
                    fund, level,
                    plan: [st.p1, st.p2, st.p3].filter(Boolean).join(' - '),
                    l1: level === '科目' ? st.l1 : '', l2: level === '科目' ? st.l2 : '', l3: level === '科目' ? st.l3 : '',
                    name: displayName, amounts,
                });
            }
        }

        function displayDetailTable(data, amtCols, opts) {
            opts = opts || {};
            const cont = document.getElementById('tableContainerD');
            if (!amtCols) amtCols = Object.keys(data.find(r => Object.keys(r.amounts).length)?.amounts || {});
            const hasDecal = _detailSources.some(s => s.unit === '元');
            const mergeToggle = (_detailSources.length > 1) ? `<label style="margin-left:12px;"><input type="checkbox" id="dMerge"${opts.merged ? ' checked' : ''}> 並排比較（合併 ${_detailSources.length} 個來源、依年度對欄${hasDecal ? '，決算元自動換算千元' : ''}）</label>` : '';
            const srcHTML = (_detailSources.length > 1) ? `<div class="filter-container"><label>來源: <select id="dSource"${opts.merged ? ' disabled' : ''} style="padding:8px;border:1px solid #ccc;border-radius:4px;max-width:320px;">${_detailSources.map((s, i) => `<option value="${i}"${i === opts.idx ? ' selected' : ''}>${escapeHtml(s.label)}（${escapeHtml(s.fileName || '')}・${s.rows.length}列）</option>`).join('')}</select></label>${mergeToggle}</div>` : '';
            const fmt = v => (v === null || v === undefined) ? '' : v.toLocaleString();
            const fmtDiff = v => (v === null || v === undefined) ? '' : (v > 0 ? '+' : '') + v.toLocaleString();
            const diffClass = v => (v === null || v === undefined) ? '' : (v > 0 ? 'diff-pos' : (v < 0 ? 'diff-neg' : 'diff-zero'));
            const fmtDiffHtml = v => (v === null || v === undefined) ? '' : `<span class="${diffClass(v)}">${fmtDiff(v)}</span>`;
            const uniq = key => [...new Set(data.map(r => r[key]).filter(Boolean))].sort();
            const hasFund = data.some(r => r.fund);
            const selHTML = (id, label, vals) => `<label>${label}: <select id="${id}" style="padding:8px;border:1px solid #ccc;border-radius:4px;max-width:220px;"><option value="">全部</option>${vals.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('')}</select></label>`;

            // Detect comparison columns: 本年度預算 vs 上年度預算 / 前年度決算
            const year = opts.year;
            const _matchCol = (col, patterns) => patterns.some(p => col.includes(p));
            const curBudget = amtCols.find(c => _matchCol(c, ['本年度預算', year != null ? year + '預算' : '__none__']));
            const prevBudget = amtCols.find(c => _matchCol(c, ['上年度預算', year != null ? (year - 1) + '預算' : '__none__']));
            const prevDecal = amtCols.find(c => _matchCol(c, ['前年度決算', year != null ? (year - 2) + '決算' : '__none__']));
            const comparisons = [];
            if (curBudget && prevBudget) comparisons.push({ key: 'curVsPrevBudget', label: `本年度預算 − 上年度預算`, a: curBudget, b: prevBudget });
            if (curBudget && prevDecal) comparisons.push({ key: 'curVsPrevDecal', label: `本年度預算 − 前年度決算`, a: curBudget, b: prevDecal });
            // Calculate diff values for each row
            const diffs = data.map(r => {
                const d = {};
                for (const c of comparisons) d[c.key] = (r.amounts[c.a] ?? null) != null && (r.amounts[c.b] ?? null) != null ? r.amounts[c.a] - r.amounts[c.b] : null;
                return d;
            });
            const comparisonOptions = [
                { key: 'inc', label: '增加（差異 > 0）' },
                { key: 'dec', label: '減少（差異 < 0）' },
                { key: 'eq', label: '無增減（差異 = 0）' },
                { key: 'inc10', label: '增加 ≥ 10%' },
                { key: 'dec10', label: '減少 ≥ 10%' },
            ];

            const filterHTML = `<div class="filter-container" style="flex-wrap:wrap;">
                ${hasFund ? selHTML('dFund', '基金', uniq('fund')) : ''}
                ${selHTML('dPlan', '計畫', uniq('plan'))}
                <label>層級: <select id="dLevel" style="padding:8px;border:1px solid #ccc;border-radius:4px;"><option value="">全部</option><option value="計畫">計畫</option><option value="科目">科目</option></select></label>
                ${selHTML('dL1', '一級科目', uniq('l1'))}
                ${selHTML('dL2', '二級科目', uniq('l2'))}
                ${selHTML('dL3', '三級科目', uniq('l3'))}
                ${comparisons.length ? `<label>比較增減: <select id="dDiffType" style="padding:8px;border:1px solid #ccc;border-radius:4px;"><option value="">全部</option>${comparisons.map(c => `<optgroup label="${escapeHtml(c.label)}">${comparisonOptions.map(o => `<option value="${c.key}_${o.key}">${escapeHtml(o.label)}</option>`).join('')}</optgroup>`).join('')}</select></label>` : ''}
                <input type="text" id="dKw" placeholder="關鍵字篩選..." style="padding:8px;border:1px solid #ccc;border-radius:4px;">
                <button id="dExport" class="btn-success">匯出 xlsx</button>
                <span id="dCount" style="color:#0056b3;font-style:italic;"></span></div>`;
            const unit = opts.unit || '千元';
            const el = id => document.getElementById(id);
            const th = `<th style="min-width:160px;">基金</th><th style="min-width:240px;">計畫 / 科目</th>` + amtCols.map(c => `<th>${escapeHtml(c)}<br><span style="font-weight:normal;font-size:11px;opacity:.75">(${unit})</span></th>`).join('') + comparisons.map(c => `<th>${escapeHtml(c.label)}<br><span style="font-weight:normal;font-size:11px;opacity:.75">(${unit})</span></th>`).join('');
            const rowLevel = r => { if (r.level === '計畫') return 'd-plan'; if (r.l3 && r.name === r.l3) return 'd-l3'; if (r.l2 && r.name === r.l2) return 'd-l2'; return 'd-l1'; };
            const rowHtml = (r, i) => { const cls = rowLevel(r); return `<tr class="${cls}" data-fund="${escapeHtml(r.fund)}" data-plan="${escapeHtml(r.plan)}" data-level="${r.level}">
                <td style="white-space:nowrap;">${escapeHtml(r.fund)}</td>
                <td class="d-name">${escapeHtml(r.level === '計畫' ? (r.plan.split(' - ').slice(-1)[0] || r.name) : r.name)}</td>
                ${amtCols.map(c => `<td class="d-amt">${fmt(r.amounts[c])}</td>`).join('')}
                ${comparisons.map(c => `<td class="d-amt">${fmtDiffHtml(diffs[i][c.key])}</td>`).join('')}</tr>`; };
            cont.innerHTML = srcHTML + filterHTML + `<div class="d-table-wrap"><table id="dTable"><thead><tr>${th}</tr></thead><tbody>${data.map((r, i) => rowHtml(r, i)).join('')}</tbody></table></div>`;
            if (el('dSource')) el('dSource').addEventListener('change', e => showDetailSource(parseInt(e.target.value, 10)));
            if (el('dMerge')) el('dMerge').addEventListener('change', e => { _detailView = e.target.checked ? { merged: true } : { merged: false, idx: 0 }; renderDetail(); });
            const rows = el('dTable').tBodies[0].rows;

            // Cascading dropdown definitions: parent → child hierarchy
            const selectDefs = [
                ...(hasFund ? [['dFund', 'fund']] : []),
                ['dPlan', 'plan'],
                ['dLevel', 'level'],
                ['dL1', 'l1'], ['dL2', 'l2'], ['dL3', 'l3'],
            ];
            const selects = selectDefs.map(([id, key]) => [el(id), key]).filter(([s]) => s);

            // 科目有隸屬關係：下層選單只列出符合上層選擇的資料列中出現過的值
            const refreshOptions = (fromLevel) => {
                for (let lvl = fromLevel; lvl < selects.length; lvl++) {
                    const [sel, key] = selects[lvl];
                    const prevValue = sel.value;
                    let subset = data;
                    for (let up = 0; up < lvl; up++) {
                        const [upSel, upKey] = selects[up];
                        if (upSel.value) subset = subset.filter(r => r[upKey] === upSel.value);
                    }
                    const values = [...new Set(subset.map(r => r[key]).filter(Boolean))].sort();
                    sel.innerHTML = `<option value="">全部</option>` +
                        values.map(v => `<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join('');
                    sel.value = values.includes(prevValue) ? prevValue : '';
                }
            };

            const apply = () => {
                const f = el('dFund') ? el('dFund').value : '';
                const p = el('dPlan').value;
                const lv = el('dLevel').value;
                const l1 = el('dL1') ? el('dL1').value : '';
                const l2 = el('dL2') ? el('dL2').value : '';
                const l3 = el('dL3') ? el('dL3').value : '';
                const diffVal = el('dDiffType') ? el('dDiffType').value : '';
                const kw = el('dKw').value.toLowerCase().trim();
                let vis = 0;
                for (let i = 0; i < rows.length; i++) {
                    const d = data[i];
                    let ok = (!f || d.fund === f) && (!p || d.plan === p) && (!lv || d.level === lv)
                        && (!l1 || d.l1 === l1) && (!l2 || d.l2 === l2) && (!l3 || d.l3 === l3);
                    if (ok && diffVal) {
                        const [compKey, cmp] = diffVal.split('_');
                        const diff = diffs[i][compKey];
                        const base = d.amounts[comparisons.find(c => c.key === compKey)?.b];
                        if (diff == null) ok = false;
                        else if (cmp === 'inc') ok = diff > 0;
                        else if (cmp === 'dec') ok = diff < 0;
                        else if (cmp === 'eq') ok = diff === 0;
                        else if (cmp === 'inc10') ok = base ? diff / base >= 0.1 : false;
                        else if (cmp === 'dec10') ok = base ? diff / base <= -0.1 : false;
                    }
                    if (ok && kw) ok = (d.fund + d.plan + d.name).toLowerCase().includes(kw);
                    rows[i].style.display = ok ? '' : 'none'; if (ok) vis++;
                }
                el('dCount').textContent = `顯示 ${vis} / ${data.length} 列`;
            };

            selects.forEach(([sel], lvl) => sel.addEventListener('change', () => {
                refreshOptions(lvl + 1);
                apply();
            }));
            if (el('dDiffType')) el('dDiffType').addEventListener('change', apply);
            el('dKw').addEventListener('keydown', e => { if (e.key === 'Enter') apply(); });
            apply();
            el('dExport').addEventListener('click', () => {
                const diffHeaders = comparisons.map(c => c.label + '(千元)');
                const aoa = [['基金', '層級', '計畫', '一級科目', '二級科目', '三級科目', '科目名', ...amtCols.map(c => c + '(千元)'), ...diffHeaders]];
                for (let i = 0; i < rows.length; i++) { if (rows[i].style.display === 'none') continue; const r = data[i]; aoa.push([r.fund, r.level, r.plan, r.l1 || '', r.l2 || '', r.l3 || '', r.level === '科目' ? r.name : '', ...amtCols.map(c => r.amounts[c] ?? ''), ...comparisons.map(c => diffs[i][c.key] ?? '')]); }
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(aoa), '用途明細表比較');
                XLSX.writeFile(wb, '用途明細表比較.xlsx');
            });
        }
    </script>
</body>
</html>
